version: "3.9"

# ============================================================================
# Permissioned DeFi Compliance Engine
# 12 services, 3 networks, strict trust boundaries
# ============================================================================

volumes:
  postgres_data:
  kafka_data:

networks:
  # DMZ: only the API gateway is internet-facing
  dmz:
    driver: bridge

  # Internal: DB, Kafka, and business services
  internal:
    driver: bridge

  # Signing: isolated network for MPC nodes
  signing:
    driver: bridge

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: defi_user
      POSTGRES_PASSWORD: defi_pass
      POSTGRES_DB: defi_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U defi_user -d defi_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - internal

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_started
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Business Services ──────────────────────────────────────────────────────

  compliance-engine:
    build:
      context: ./services/compliance-engine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://defi_user:defi_pass@postgres:5432/defi_db
      PORT: 8001
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  ledger-service:
    build:
      context: ./services/ledger-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://defi_user:defi_pass@postgres:5432/defi_db
      PORT: 8002
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  settlement-service:
    build:
      context: ./services/settlement-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://defi_user:defi_pass@postgres:5432/defi_db
      PORT: 8003
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Signing Infrastructure (isolated network) ─────────────────────────────

  signing-gateway:
    build:
      context: ./services/signing-gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mpc-node-1:
        condition: service_healthy
      mpc-node-2:
        condition: service_healthy
      mpc-node-3:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://defi_user:defi_pass@postgres:5432/defi_db
      MPC_NODES: http://mpc-node-1:8001,http://mpc-node-2:8001,http://mpc-node-3:8001
      QUORUM_THRESHOLD: 2
      PORT: 8004
    networks:
      - internal
      - signing
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mpc-node-1:
    build:
      context: ./services/mpc-node
    restart: unless-stopped
    environment:
      NODE_ID: SIGNER_1
      PORT: 8001
    networks:
      - signing
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  mpc-node-2:
    build:
      context: ./services/mpc-node
    restart: unless-stopped
    environment:
      NODE_ID: SIGNER_2
      PORT: 8001
    networks:
      - signing
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  mpc-node-3:
    build:
      context: ./services/mpc-node
    restart: unless-stopped
    environment:
      NODE_ID: SIGNER_3
      PORT: 8001
    networks:
      - signing
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Event Infrastructure ───────────────────────────────────────────────────

  outbox-publisher:
    build:
      context: ./services/outbox-publisher
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://defi_user:defi_pass@postgres:5432/defi_db
      KAFKA_BOOTSTRAP: kafka:9092
      POLL_INTERVAL_SECS: 1
      MAX_RETRIES: 5
    networks:
      - internal

  event-consumer:
    build:
      context: ./services/event-consumer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://defi_user:defi_pass@postgres:5432/defi_db
      KAFKA_BOOTSTRAP: kafka:9092
      CONSUMER_GROUP: defi-event-consumer
    networks:
      - internal

  reconciliation:
    build:
      context: ./services/reconciliation
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://defi_user:defi_pass@postgres:5432/defi_db
      RECONCILIATION_INTERVAL: 60
    networks:
      - internal

  # ── API Gateway (only internet-facing service) ─────────────────────────────

  api-gateway:
    build:
      context: ./services/api-gateway
    restart: unless-stopped
    depends_on:
      compliance-engine:
        condition: service_healthy
      ledger-service:
        condition: service_healthy
      settlement-service:
        condition: service_healthy
      signing-gateway:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://defi_user:defi_pass@postgres:5432/defi_db
      COMPLIANCE_URL: http://compliance-engine:8001
      LEDGER_URL: http://ledger-service:8002
      SETTLEMENT_URL: http://settlement-service:8003
      SIGNING_URL: http://signing-gateway:8004
      PORT: 8000
    ports:
      - "8000:8000"
    networks:
      - dmz
      - internal
